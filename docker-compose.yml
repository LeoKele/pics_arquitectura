services: # Aquí declaramos todos los contenedores (las piezas) de nuestro sistema.

  base_datos: # Nombre de este servicio.
    image: postgis/postgis:17-master
    environment: # Variables de entorno. Son configuraciones ocultas.
      POSTGRES_USER: ${POSTGRES_USER}       # Define el usuario de la BD.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}  # Define la contraseña.
      POSTGRES_DB: ${POSTGRES_DB}   # Crea una base de datos con este nombre al arrancar.
    ports:
      - "5433:5432" # Conecta el puerto de tu computadora real (izq) con el del contenedor (der).
    volumes:
      - datos_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  almacenamiento-objetos:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"  # Puerto por donde se comunica el código (FastAPI)
      - "9001:9001"  # Puerto para entrar por el navegador a ver los archivos
    volumes:
      - datos_minio:/data

  redis_queue:
    image: redis:alpine
    ports:
      - "6379:6379"

  api_fastapi:
    build: ./api # A diferencia de 'image', 'build' le dice a Docker "No lo descargues de internet. Ve a la carpeta local llamada '/api', lee el archivo Dockerfile que está ahí y construye la imagen desde cero con mi código Python".
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@base_datos:5432/${POSTGRES_DB}
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - REDIS_HOST=redis_queue
      - OLLAMA_URL=http://ollama:11434
    ports:
      - "8000:8000" # Exponemos el puerto para que puedas entrar a http://localhost:8000
    depends_on: # Regla de orden: Le dice a Docker que no arranque la API hasta que la base de datos esté funcionando, porque la API la necesita para arrancar.
      base_datos:
        condition: service_healthy   # <-- espera el healthcheck
      almacenamiento-objetos:
        condition: service_started
      redis_queue:
        condition: service_started
      ollama:
        condition: service_started
    volumes:
      - ./api:/api

  worker_procesamiento:
    build: ./worker
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@base_datos:5432/${POSTGRES_DB}
      - REDIS_HOST=redis_queue
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    depends_on:
      base_datos:
        condition: service_healthy
      redis_queue:
        condition: service_started

  worker_preprocesamiento:
    build: ./worker
    command: python worker_preprocesamiento.py
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@base_datos:5432/${POSTGRES_DB}
      - REDIS_HOST=redis_queue
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    depends_on:
      base_datos:
        condition: service_healthy
      redis_queue:
        condition: service_started


# ── LOGS ────────────────────────────────────────────────────────

  loki:
    image: grafana/loki:2.7.0
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:2.7.0
    volumes:
      - ./observabilidad/promtail-config.yml:/etc/promtail/config.yml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    depends_on:
      - loki

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - datos_ollama:/root/.ollama


volumes:
  datos_pg:
  datos_minio:
  datos_ollama:
